# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.backend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# JWT Configuration
app.jwt.secret=mySecretKeyForJWTAuthenticationAndAuthorizationModule2024ProductionReady
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Application Configuration
spring.application.name=hospital-followup-system
spring.mvc.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true
spring.mvc.cors.max-age=3600

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# Security Configuration
spring.security.filter.order=5

# Email (Gmail SMTP — free tier: use an App Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Notification delivery (Twilio free trial for SMS + WhatsApp sandbox)
app.notifications.demo-mode=true
app.notifications.from-email=noreply@hospital.local
app.notifications.from-name=Hospital Follow-Up
app.notifications.twilio-account-sid=TWILIO_ACCOUNT_SID
app.notifications.twilio-auth-token=TWILIO_AUTH_TOKEN
app.notifications.twilio-phone-number=TWILIO_PHONE_NUMBER
# app.notifications.twilio-whatsapp-number=TWILIO_WHATSAPP_NUMBER=
